name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock --legacy-peer-deps

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Generate Android Assets (Icono Personalizado)
        run: |
          npm install @capacitor/assets
          mkdir -p assets
          # Usamos tu favicon como base para el icono del móvil
          cp public/favicon.ico assets/logo.png
          # Generamos los iconos con fondo oscuro para que no aparezca el logo de Capacitor
          npx @capacitor/assets generate --android --iconBackgroundColor '#0a0a0a' --iconBackgroundColorDark '#0a0a0a'

      - name: Initialize & Configure Capacitor
        run: |
          # Configuramos la URL de Vercel para que la sesión se mantenga dentro de la App
          echo '{
            "appId": "com.misfinanzas.app",
            "appName": "Mis Finanzas",
            "webDir": "out",
            "server": {
              "url": "https://mis-finanzas-kappa.vercel.app",
              "allowNavigation": [
                "mis-finanzas-kappa.vercel.app",
                "*.supabase.co"
              ]
            }
          }' > capacitor.config.json
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Configure Android Manifest (Deep Links)
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          # El parámetro autoVerify="true" es lo que permite que el login de Google te devuelva a la App
          sed -i 's|</activity>|<intent-filter android:autoVerify="true"><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="https" android:host="mis-finanzas-kappa.vercel.app" /></intent-filter></activity>|g' $FILE

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mis-Finanzas-App-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
