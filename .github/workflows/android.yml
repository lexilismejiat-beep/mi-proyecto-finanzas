name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock --legacy-peer-deps

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Generate Android Assets
        run: |
          npm install @capacitor/assets
          mkdir -p assets
          cp public/favicon.ico assets/logo.png || cp public/logo.png assets/logo.png
          npx @capacitor/assets generate --android --iconBackgroundColor '#0a0a0a' --iconBackgroundColorDark '#0a0a0a'

      - name: Initialize & Configure Capacitor
        run: |
          echo '{
            "appId": "com.misfinanzas.app",
            "appName": "Mis Finanzas",
            "webDir": "out",
            "server": {
              "url": "https://mis-finanzas-kappa.vercel.app",
              "allowNavigation": [
                "mis-finanzas-kappa.vercel.app",
                "*.supabase.co"
              ]
            }
          }' > capacitor.config.json
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Configure Android Manifest (Deep Links & Auth Fix)
        run: |
          FILE="android/app/src/main/AndroidManifest.xml"
          
          # 1. Creamos el Intent Filter para el esquema personalizado (com.misfinanzas.app://app)
          # Esto es lo que usará Supabase para "saltar" de vuelta a la app
          AUTH_FILTER='<intent-filter><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="com.misfinanzas.app" android:host="app" /></intent-filter>'
          
          # 2. Creamos el Intent Filter para el dominio de Vercel (App Links)
          VERCEL_FILTER='<intent-filter android:autoVerify="true"><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="https" android:host="mis-finanzas-kappa.vercel.app" /></intent-filter>'
          
          # Inyectamos ambos filtros antes del cierre de la actividad principal
          sed -i "s|<\/activity>|${AUTH_FILTER}${VERCEL_FILTER}<\/activity>|g" $FILE

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mis-Finanzas-App-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
