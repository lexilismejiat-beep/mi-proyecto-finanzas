name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install --no-package-lock --legacy-peer-deps
          npm install @codetrix-studio/capacitor-google-auth

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      # --- PASO CRÍTICO: EXTRAER SHA-1 ---
      # Esto imprimirá la clave en los logs de GitHub Actions
      - name: Extract SHA1 for Google Cloud
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "cn=Unknown, ou=Unknown, o=Unknown, c=Unknown" || true
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android

      - name: Initialize & Configure Capacitor
        run: |
          # Solo añadimos la plataforma, NO sobrescribimos el capacitor.config.json 
          # porque ya lo tienes bien configurado en tu repo de GitHub.
          npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mis-Finanzas-App-v2
          path: android/app/build/outputs/apk/debug/app-debug.apk
