name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock --legacy-peer-deps

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Initialize Capacitor
        run: |
          npx cap init "Mis Finanzas" com.misfinanzas.app --web-dir out
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force Deep Links in AndroidManifest
        run: |
          # Este script busca la etiqueta <activity> principal e inyecta el filtro de retorno
          # Esto es lo que hace que el link com.misfinanzas.app://app abra la aplicación
          FILE="android/app/src/main/AndroidManifest.xml"
          sed -i '/<activity/a \
                <intent-filter>\
                    <action android:name="android.intent.action.VIEW" />\
                    <category android:name="android.intent.category.DEFAULT" />\
                    <category android:name="android.intent.category.BROWSABLE" />\
                    <data android:scheme="com.misfinanzas.app" android:host="app" />\
                </intent-filter>' $FILE
          echo "AndroidManifest actualizado con el esquema com.misfinanzas.app://app"

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiFinanzas-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
