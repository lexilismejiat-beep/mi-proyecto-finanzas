name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Hemos eliminado totalmente la configuración de cache para evitar el error

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build Next.js
        run: npm run build

      - name: Initialize Capacitor
        run: |
          npx cap init "Mis Finanzas" com.misfinanzas.app --web-dir out
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiFinanzas-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
